<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admission Form</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  
  <style>
    body{
      background-color: antiquewhite;
      padding :5%;
       
    }
    h1{
      text-align: center;
      margin-bottom :5%;
    }
     .Ad-form{
       display : block
     }
     
    .form{
      margin-bottom : 15%;
      background-color: white;
       padding :6%;
    }
   
   .information {
     line-height: 0.6;
     background-color: white;
     padding :4%;
   }
   
    @media(min-width: 768px){
      .Ad-form{
        display: flex;
        flex-direction : row;
        justify-content: space-between;
      }
    
    .form{
      display: flex;
      flex-flow: left;
      width: 60%;
    }
    .information{
      flex-flow: right;
      height: 40%;
      width:35%;
      line-height :1.5;
    }
    }
  </style>
  
</head>

<body
  <h1> Admission Form</h1>
  <div class="Ad-form">
  <div class="form ">
  <form id="apply" action="mailto:info@brightfuture.com" ectype="plain/text" target="_blank" method="post">
    <label> Student's Name</label>
    <input type="text" name="student">
    <br>
    <br>
    <label> Father's Name</label>
    <input type="text" name="father">
    <br>
    <br>
    <label>Email </label>
    <input type="email" name="email">
    <br>
    <br>
    <label>phone</label>
    <input type="number" name="phone">
    <br>
    <br>
    <label>Select Class </label>
    <select>
      <option> 1 Class </option>
      <option> 2 Class </option>
      <option> 3 Class </option>
      <option> 4 Class </option>
      <option> 5 Class </option>
      <option> 6 Class </option>
      <option> 7 Class </option>
      <option> 8 Class </option>
      <option> 9 Class </option>
       <option> 10 Class </option>
       <option> 11 Class </option>
       <option> 12 Class </option>
    </select>
    <br>
    <br>
    <label> Write your message: </label>
    <br>
    <textarea cols= 30px rows="10px"></textarea>
    <br>
    <br>
    <div class="d-grid gap-2 d-md-block">
    <button type ="submit" class="btn btn-primary">Submit Application</button>
    </div>
  </form>
  </div>
  
  <div class="information">
    <h4>Contact Information</h4>
    <p><b>Address:</b> Main Street City, Pakistan</p>
    <p><b>Phone:</b> 0123456789</p>
    <p><b>Email:</b> info@brightfuture.com</p>
  </div>
  </div>
  
  


   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>

</html>
